name: Reply Dispatch

on:
  repository_dispatch:
    types:
      - threads_reply_action

jobs:
  log-payload:
    runs-on: ubuntu-latest

    steps:
      - name: Show dispatch payload
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          echo "event_type=${{ github.event.action }}"
          echo "$CLIENT_PAYLOAD"
