name: Reply Dispatch

on:
  repository_dispatch:
    types:
      - threads_reply_action

permissions:
  contents: write

concurrency:
  group: thread-os-state-write
  cancel-in-progress: false

jobs:
  reply-dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Execute reply dispatch
        env:
          CLIENT_PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
          REPLY_DRY_RUN: ${{ github.event.client_payload.dry_run == true && '1' || '0' }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_STORE_PATH: state/reply_tasks.json
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python -m threads_bot_system dispatch

      - name: Commit reply task state
        if: always()
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$(git status --short -- state/reply_tasks.json)" ]; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/reply_tasks.json
          git commit -m "Update reply task state"
          git push origin "HEAD:${BRANCH_NAME}"

      - name: Reply dispatch failure summary
        if: failure()
        run: |
          {
            echo "## Threads reply dispatch failure"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- State file: state/reply_tasks.json"
            echo "- Automatic retry: disabled; verify the task status before manual recovery."
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f state/reply_tasks.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          state = json.loads(Path("state/reply_tasks.json").read_text(encoding="utf-8"))
          for task in state.get("tasks", {}).values():
              if task.get("status") in {"failed", "unknown"}:
                  print(f"- Task: `{task.get('reply_task_id')}`")
                  print(f"  - Comment: `{task.get('comment_id')}`")
                  print(f"  - Status: `{task.get('status')}`")
                  print(f"  - Phase: {task.get('error_phase', 'unknown')}")
                  print(f"  - Error: {task.get('last_error')}")
                  print(f"  - External action: {task.get('external_action', False)}")
                  print(f"  - Retry allowed: {task.get('retry_allowed', False)}")
                  print(f"  - Recovery: {task.get('recovery_action', 'manual')}")
          PY
          fi

      - name: Upload reply state recovery artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reply-dispatch-state-recovery-${{ github.run_id }}
          path: state/reply_tasks.json
          if-no-files-found: warn
          retention-days: 7
