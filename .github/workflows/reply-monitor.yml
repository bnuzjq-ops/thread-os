name: Reply Monitor

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Create review tasks that cannot call the real Threads reply API"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types:
      - threads_reply_monitor
permissions:
  contents: write

concurrency:
  group: thread-os-state-write
  cancel-in-progress: false

jobs:
  reply-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run reply monitor
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          THREADS_STORE_PATH: state/reply_tasks.json
          THREADS_MONITOR_CURSOR_PATH: state/reply_monitor_cursor.json
          REPLY_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          REPLY_TRIGGER_SOURCE: ${{ github.event_name == 'schedule' && 'schedule' || github.event_name == 'workflow_dispatch' && 'workflow_dispatch' || 'repository_dispatch' }}
        run: python -m threads_bot_system monitor

      - name: Commit reply task state
        if: always()
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$(git status --short -- state/reply_tasks.json state/reply_monitor_cursor.json)" ]; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/reply_tasks.json state/reply_monitor_cursor.json
          git stash push --include-untracked -m "reply-monitor-state"
          git fetch origin "${BRANCH_NAME}"
          git rebase "origin/${BRANCH_NAME}"
          git stash pop
          git add state/reply_tasks.json state/reply_monitor_cursor.json
          git commit -m "Update reply task state"
          git push origin "HEAD:${BRANCH_NAME}"

      - name: Reply monitor failure summary
        if: failure()
        run: |
          {
            echo "## Threads reply monitor failure"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- State files: state/reply_tasks.json, state/reply_monitor_cursor.json"
            echo "- Automatic retry: disabled; inspect the persisted task and cursor before recovery."
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f state/reply_tasks.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          state = json.loads(Path("state/reply_tasks.json").read_text(encoding="utf-8"))
          for task in state.get("tasks", {}).values():
              if task.get("status") in {"failed", "unknown"}:
                  print(f"- Task: `{task.get('reply_task_id')}`")
                  print(f"  - Comment: `{task.get('comment_id')}`")
                  print(f"  - Status: `{task.get('status')}`")
                  print(f"  - Phase: {task.get('error_phase', 'unknown')}")
                  print(f"  - Error: {task.get('last_error')}")
                  print(f"  - External action: {task.get('external_action', False)}")
                  print(f"  - Retry allowed: {task.get('retry_allowed', False)}")
                  print(f"  - Recovery: {task.get('recovery_action', 'manual')}")
          PY
          fi

      - name: Upload reply state recovery artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reply-monitor-state-recovery-${{ github.run_id }}
          path: |
            state/reply_tasks.json
            state/reply_monitor_cursor.json
          if-no-files-found: warn
          retention-days: 7
