name: Publish Threads

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: threads-publish-state
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout content repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.CONTENT_REPO }}
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          path: content-repo
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish pending Threads posts
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_PUBLISH_STORE_PATH: state/publish_tasks.json
          PUBLISH_TRIGGER_EVENT: ${{ github.event_name }}
          PUBLISH_TRIGGER_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          mapfile -d '' sources < <(
            grep -rlZ --include='*.md' \
              -e '^platform:[[:space:]]*threads[[:space:]]*$' \
              -e '^status:[[:space:]]*ready[[:space:]]*$' \
              content-repo
          )
          for source in "${sources[@]}"; do
            if grep -q '^platform:[[:space:]]*threads[[:space:]]*$' "$source" && \
               grep -q '^status:[[:space:]]*ready[[:space:]]*$' "$source"; then
              python -m threads_bot_system publish --source "$source"
            fi
          done

      - name: Verify published Threads posts
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_PUBLISH_STORE_PATH: state/publish_tasks.json
        run: |
          python - <<'PY'
          import json
          import os
          from urllib.parse import urlencode
          from urllib.request import urlopen

          state_path = os.environ["THREADS_PUBLISH_STORE_PATH"]
          state = json.load(open(state_path, encoding="utf-8"))
          tasks = state.get("tasks", {})
          published = [
              task for task in tasks.values()
              if task.get("status") == "published" and task.get("post_id")
          ]
          if not published:
              print("No published post IDs to verify.")
              raise SystemExit(0)

          for task in published:
              post_id = task["post_id"]
              query = urlencode({
                  "fields": "id,username,permalink,text",
                  "access_token": os.environ["THREADS_ACCESS_TOKEN"],
              })
              url = f"https://graph.threads.net/v1.0/{post_id}?{query}"
              with urlopen(url, timeout=30) as response:
                  payload = json.load(response)
              print(json.dumps({
                  "content_id": task.get("source_key"),
                  "post_id": payload.get("id"),
                  "username": payload.get("username"),
                  "permalink": payload.get("permalink"),
                  "text": payload.get("text"),
              }, ensure_ascii=False))
          PY

      - name: Commit publish task state
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$(git status --short -- state/publish_tasks.json)" ]; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/publish_tasks.json
          git commit -m "Update publish task state"
          git push origin "HEAD:${BRANCH_NAME}"
