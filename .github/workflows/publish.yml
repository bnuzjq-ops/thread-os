name: Publish Threads

on:
  repository_dispatch:
    types:
      - threads_publish_scheduled
  workflow_dispatch:
    inputs:
      source_path:
        description: "Single content-system queue file to publish"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: thread-os-state-write
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout content repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.CONTENT_REPO }}
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          path: content-repo
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.snapshot_commit || 'main' }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish pending Threads posts
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_PUBLISH_STORE_PATH: state/publish_tasks.json
          ENV: ${{ vars.ENV }}
          PUBLISH_ENABLED: ${{ vars.PUBLISH_ENABLED }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          MAX_DAILY_POSTS: ${{ vars.MAX_DAILY_POSTS }}
          MIN_POST_INTERVAL_MINUTES: ${{ vars.MIN_POST_INTERVAL_MINUTES }}
          MAX_CONSECUTIVE_FAILURES: ${{ vars.MAX_CONSECUTIVE_FAILURES }}
          MAX_CONSECUTIVE_UNKNOWN: ${{ vars.MAX_CONSECUTIVE_UNKNOWN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PUBLISH_TRIGGER_EVENT: ${{ github.event_name }}
          PUBLISH_SOURCE_PATH: ${{ inputs.source_path }}
          PUBLISH_DISPATCH_SOURCE_PATH: ${{ github.event.client_payload.snapshot_path }}
          PUBLISH_DISPATCH_TASK_ID: ${{ github.event.client_payload.content_id }}
          PUBLISH_DISPATCH_VERSION: ${{ github.event.client_payload.content_version }}
          PUBLISH_DISPATCH_SCHEDULED_TIME: ${{ github.event.client_payload.scheduled_time }}
          PUBLISH_DISPATCH_LATEST_TIME: ${{ github.event.client_payload.latest_publish_time }}
          PUBLISH_DISPATCH_BATCH_ID: ${{ github.event.client_payload.batch_id }}
          PUBLISH_DISPATCH_TASKS: ${{ toJson(github.event.client_payload.tasks) }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "repository_dispatch" ]; then
            test -n "$PUBLISH_DISPATCH_BATCH_ID"
            test -n "$PUBLISH_DISPATCH_TASKS"
            test -n "$PUBLISH_DISPATCH_SCHEDULED_TIME"
            test -n "$PUBLISH_DISPATCH_LATEST_TIME"
            failures=0
            while IFS= read -r task; do
              content_id=$(printf '%s' "$task" | jq -r '.content_id')
              version=$(printf '%s' "$task" | jq -r '.content_version')
              source_path=$(printf '%s' "$task" | jq -r '.snapshot_path')
              case "$source_path" in
                publish-feed/posts/queue/*.md) ;;
                *) echo "Invalid dispatch source path: $source_path"; failures=$((failures + 1)); continue ;;
              esac
              source="content-repo/$source_path"
              if [ ! -f "$source" ]; then
                echo "Missing batch source: $source"
                failures=$((failures + 1))
                continue
              fi
              if ! python -m threads_bot_system publish --source "$source" \
                --task-id "publish:$content_id:v$version"; then
                failures=$((failures + 1))
              fi
            done < <(printf '%s' "$PUBLISH_DISPATCH_TASKS" | jq -c '.[]')
            if [ "$failures" -gt 0 ]; then
              echo "Batch $PUBLISH_DISPATCH_BATCH_ID completed with $failures failed task(s)."
              exit 1
            fi
          else
            test -n "$PUBLISH_SOURCE_PATH"
            case "$PUBLISH_SOURCE_PATH" in
              publish-feed/posts/queue/*.md) ;;
              *) echo "Invalid manual source path: $PUBLISH_SOURCE_PATH"; exit 1 ;;
            esac
            source="content-repo/$PUBLISH_SOURCE_PATH"
            test -f "$source"
            python -m threads_bot_system publish --source "$source"
          fi

      - name: Commit publish task state
        if: always()
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$(git status --short -- state/publish_tasks.json)" ]; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/publish_tasks.json
          git stash push --include-untracked -m "publish-state"
          git fetch origin "${BRANCH_NAME}"
          git rebase "origin/${BRANCH_NAME}"
          git stash pop
          git add state/publish_tasks.json
          git commit -m "Update publish task state"
          git push origin "HEAD:${BRANCH_NAME}"

      - name: Publish failure summary
        if: failure()
        env:
          DISPATCH_TASK_ID: ${{ github.event.client_payload.content_id }}
          DISPATCH_VERSION: ${{ github.event.client_payload.content_version }}
          DISPATCH_TASKS: ${{ toJson(github.event.client_payload.tasks) }}
        run: |
          {
            echo "## Threads publish failure"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- State file: state/publish_tasks.json"
            echo "- Automatic retry: disabled; inspect the task's error_type and last_error before manual recovery."
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f state/publish_tasks.json ]; then
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path
          state = json.loads(Path("state/publish_tasks.json").read_text(encoding="utf-8"))
          task_ids = []
          if os.environ.get("GITHUB_EVENT_NAME") == "repository_dispatch":
              raw_tasks = os.environ.get("DISPATCH_TASKS", "")
              if raw_tasks:
                  task_ids = [
                      f"publish:{item['content_id']}:v{item['content_version']}"
                      for item in json.loads(raw_tasks)
                  ]
              else:
                  content_id = os.environ.get("DISPATCH_TASK_ID", "")
                  version = os.environ.get("DISPATCH_VERSION", "")
                  task_ids = [f"publish:{content_id}:v{version}"] if version else []
          tasks = state.get("tasks", {}).values()
          if task_ids:
              tasks = [task for task in tasks if task.get("publish_task_id") in task_ids]
          for task in tasks:
              if task.get("status") in {"failed", "unknown"}:
                  print(f"- Task: `{task.get('publish_task_id')}`; phase: `{task.get('error_phase')}`; type: `{task.get('error_type')}`; external action: `{task.get('external_action')}`; retry allowed: `{task.get('retry_allowed')}`; recovery: {task.get('recovery_action')}")
          PY
          fi

      - name: Write publishing receipt to content library
        if: always() && github.event_name == 'repository_dispatch'
        env:
          DISPATCH_TASK_ID: ${{ github.event.client_payload.content_id }}
          DISPATCH_VERSION: ${{ github.event.client_payload.content_version }}
          DISPATCH_SOURCE_PATH: ${{ github.event.client_payload.snapshot_path }}
          DISPATCH_TASKS: ${{ toJson(github.event.client_payload.tasks) }}
        run: |
          set -euo pipefail
          if [ -n "$DISPATCH_TASKS" ]; then
            while IFS= read -r task; do
              content_id=$(printf '%s' "$task" | jq -r '.content_id')
              version=$(printf '%s' "$task" | jq -r '.content_version')
              snapshot_path=$(printf '%s' "$task" | jq -r '.snapshot_path')
              python scripts/write_publish_receipt.py \
                --state state/publish_tasks.json \
                --content-root content-repo \
                --snapshot-path "$snapshot_path" \
                --task-id "publish:$content_id:v$version"
            done < <(printf '%s' "$DISPATCH_TASKS" | jq -c '.[]')
          else
            python scripts/write_publish_receipt.py \
              --state state/publish_tasks.json \
              --content-root content-repo \
              --snapshot-path "$DISPATCH_SOURCE_PATH" \
              --task-id "publish:$DISPATCH_TASK_ID:v$DISPATCH_VERSION"
          fi
          git -C content-repo fetch origin main
          git -C content-repo checkout -B main origin/main
          git -C content-repo config user.name "github-actions[bot]"
          git -C content-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git -C content-repo status --short -- receipts/publishing)" ]; then
            git -C content-repo add receipts/publishing
            git -C content-repo commit -m "Record Threads publishing receipt"
            git -C content-repo push origin main
          fi

      - name: Upload publish state recovery artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: publish-state-recovery-${{ github.run_id }}
          path: state/publish_tasks.json
          if-no-files-found: warn
          retention-days: 7
