name: Publish Threads

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: threads-publish-state
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish pending Threads posts
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_PUBLISH_STORE_PATH: state/publish_tasks.json
          PUBLISH_TRIGGER_EVENT: ${{ github.event_name }}
          PUBLISH_TRIGGER_SCHEDULE: ${{ github.event.schedule }}
        run: python -m threads_bot_system publish

      - name: Commit publish task state
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$(git status --short -- state/publish_tasks.json)" ]; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/publish_tasks.json
          git commit -m "Update publish task state"
          git push origin "HEAD:${BRANCH_NAME}"
