name: Publish Threads

on:
  workflow_dispatch:
    inputs:
      source_path:
        description: "Optional single content-system queue file to publish"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: thread-os-state-write
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout content repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.CONTENT_REPO }}
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          path: content-repo
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish pending Threads posts
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_PUBLISH_STORE_PATH: state/publish_tasks.json
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PUBLISH_TRIGGER_EVENT: ${{ github.event_name }}
          PUBLISH_TRIGGER_SCHEDULE: ${{ github.event.schedule }}
          PUBLISH_SOURCE_PATH: ${{ inputs.source_path }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            source="$(python -m threads_bot_system select-scheduled-source content-repo/publish-feed/posts/queue)"
            if [ -n "$source" ]; then
              python -m threads_bot_system publish --source "$source"
            else
              echo "No scheduled source is due."
            fi
          elif [ -n "$PUBLISH_SOURCE_PATH" ]; then
            source="content-repo/$PUBLISH_SOURCE_PATH"
            test -f "$source"
            python -m threads_bot_system publish --source "$source"
          else
            for source in content-repo/publish-feed/posts/queue/*.md; do
              [ -f "$source" ] || continue
              if grep -q '^platform:[[:space:]]*threads[[:space:]]*$' "$source" && \
                 grep -q '^editorial_status:[[:space:]]*ready[[:space:]]*$' "$source"; then
                python -m threads_bot_system publish --source "$source"
              fi
            done
          fi

      - name: Commit publish task state
        if: always()
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$(git status --short -- state/publish_tasks.json)" ]; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/publish_tasks.json
          git stash push --include-untracked -m "publish-state"
          git fetch origin "${BRANCH_NAME}"
          git rebase "origin/${BRANCH_NAME}"
          git stash pop
          git add state/publish_tasks.json
          git commit -m "Update publish task state"
          git push origin "HEAD:${BRANCH_NAME}"

      - name: Publish failure summary
        if: failure()
        run: |
          {
            echo "## Threads publish failure"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- State file: state/publish_tasks.json"
            echo "- Automatic retry: disabled; inspect the task's error_type and last_error before manual recovery."
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f state/publish_tasks.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          state = json.loads(Path("state/publish_tasks.json").read_text(encoding="utf-8"))
          for task in state.get("tasks", {}).values():
              if task.get("status") in {"failed", "unknown"}:
                  print(f"- Task: `{task.get('publish_task_id')}`; phase: `{task.get('error_phase')}`; type: `{task.get('error_type')}`; external action: `{task.get('external_action')}`; retry allowed: `{task.get('retry_allowed')}`; recovery: {task.get('recovery_action')}")
          PY
          fi

      - name: Upload publish state recovery artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: publish-state-recovery-${{ github.run_id }}
          path: state/publish_tasks.json
          if-no-files-found: warn
          retention-days: 7
